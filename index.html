<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VenecostPro - Gold</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f1c40f">
    <meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
    <div class="container">
        <h1 class="brand-name">Venecost<span>Pro</span></h1>
        <div class="icon-container">💰</div>
        
        <button class="btn-refresh" onclick="actualizarTodo()">🔄 Actualizar Precios Mercado</button>

        <label>Precio Oro Puro (gramo USD):</label>
        <input type="number" id="precioPuro" step="0.01" placeholder="Cargando oro...">

        <label>Tasa Dólar BCV (Bs):</label>
        <input type="number" id="tasaDolar" step="0.01" placeholder="Cargando tasa...">

        <label>Peso de la pieza (gramos):</label>
        <input type="number" id="peso" placeholder="Ej: 8.5">

        <label>Quilates (K):</label>
        <select id="quilates">
            <option value="24">24K (Puro)</option>
            <option value="22">22K (91.6%)</option>
            <option value="18" selected>18K (75%)</option>
            <option value="14">14K (58.3%)</option>
            <option value="10">10K (41.7%)</option>
        </select>

        <label>Margen de Ganancia: <span id="margenValor">10%</span></label>
        <input type="range" id="margen" min="0" max="50" value="10" oninput="actualizarMargen()">

        <button class="btn-main" onclick="calcular()">Calcular Valor</button>

        <div id="resultado" class="result-box">
            Esperando datos...
        </div>

        <div class="history-section">
            <h3>Historial Reciente</h3>
            <div id="listaHistorial"></div>
            <button class="btn-clear" onclick="limpiarHistorial()">Borrar Historial</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
